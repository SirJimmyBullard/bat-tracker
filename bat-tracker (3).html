<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080808">
<title>Bat Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600&display=swap');
:root{
  --bg:#080808;--bg2:#111;--border:#222;--border2:#2e2e2e;
  --green:#39ff14;--green-dim:#1a5c08;--green-mid:#22a006;
  --amber:#ffaa00;--red:#ff3333;
  --text:#ccc;--text-dim:#666;--text-dimmer:#333;
  --mono:'Share Tech Mono',monospace;--ui:'Rajdhani',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:var(--ui);height:100%;overflow:hidden;touch-action:manipulation;}

#app{display:flex;flex-direction:column;height:100vh;height:100dvh;padding:10px;gap:7px;max-width:600px;margin:0 auto;}

/* HEADER */
#header{display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
#logo{font-family:var(--mono);font-size:13px;color:var(--green);letter-spacing:3px;}
#header-right{display:flex;align-items:center;gap:10px;}
#rec-wrap{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--text-dim);}
#rec-dot{width:7px;height:7px;border-radius:50%;background:var(--text-dimmer);}
#rec-dot.live{background:var(--red);animation:blink 1.1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}

/* COUNTDOWN */
#countdown-wrap{background:var(--bg2);border:0.5px solid var(--border);border-radius:6px;padding:5px 10px;text-align:center;}
#countdown-label{font-family:var(--mono);font-size:8px;color:var(--text-dimmer);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;}
#countdown-val{font-family:var(--mono);font-size:16px;color:var(--text-dim);letter-spacing:1px;}
#countdown-val.amber{color:var(--amber);}
#countdown-val.red{color:var(--red);animation:blink 1.5s infinite;}

/* MODES */
#modes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;flex-shrink:0;}
.mode-tab{background:var(--bg2);border:0.5px solid var(--border);border-radius:6px;padding:11px 4px;text-align:center;font-family:var(--ui);font-weight:600;font-size:15px;color:var(--text-dim);cursor:pointer;letter-spacing:1.5px;text-transform:uppercase;transition:all 0.15s;}
.mode-tab.active{background:#0a1a0a;border-color:var(--green-dim);color:var(--green);}

/* BAT PILLS */
#bat-strip{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;}
.bat-pill{display:flex;align-items:center;gap:6px;background:var(--bg2);border:0.5px solid var(--border);border-radius:4px;padding:7px 10px;font-family:var(--mono);font-size:12px;color:var(--text-dim);flex:1;min-width:0;white-space:nowrap;overflow:hidden;}
.bat-pill.active{background:#0a1a0a;border-color:var(--green-dim);color:var(--green);}
.pip{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0;}
.bat-pill.active .pip{background:var(--green);box-shadow:0 0 5px var(--green);}

/* WAVEFORM — hidden in drive mode */
#wave-wrap{flex:1;position:relative;background:#030303;border:0.5px solid var(--border);border-radius:6px;overflow:hidden;min-height:0;}
canvas{width:100%;height:100%;display:block;}
#peak-label{position:absolute;left:6px;top:6px;font-family:var(--mono);font-size:9px;color:rgba(255,51,51,0.6);pointer-events:none;}

/* DRIVE PANEL — shown instead of waveform in drive mode */
#drive-panel{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#030303;border:0.5px solid var(--border);border-radius:6px;padding:20px;}
#drive-status{font-family:var(--mono);font-size:28px;color:var(--text-dimmer);text-align:center;letter-spacing:2px;}
#drive-status.detected{color:var(--green);}
#drive-status.lost{color:var(--red);}
#drive-last{font-family:var(--mono);font-size:11px;color:var(--text-dimmer);text-align:center;line-height:1.8;}
#drive-count-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
#drive-count{font-family:var(--mono);font-size:48px;color:var(--text-dim);line-height:1;}
#drive-count.lit{color:var(--green);}
#drive-count-label{font-family:var(--mono);font-size:9px;color:var(--text-dimmer);text-transform:uppercase;letter-spacing:1px;}

/* MAP LOG */
#map-log{display:none;background:var(--bg);border:0.5px solid var(--border);border-radius:6px;flex-shrink:0;overflow-y:auto;max-height:120px;padding:6px 8px;}
.map-entry{font-family:var(--mono);font-size:10px;color:var(--text-dimmer);line-height:1.8;display:flex;gap:8px;}
.map-entry .gps{color:var(--text-dim);}
.map-entry .db-s{color:var(--green);}
.map-entry .db-m{color:var(--amber);}
.map-entry .db-w{color:#666;}

/* ALERT */
#alert{background:var(--bg2);border:0.5px solid var(--border);border-radius:6px;padding:11px 14px;font-family:var(--mono);font-size:13px;color:var(--text-dimmer);text-align:center;letter-spacing:0.5px;flex-shrink:0;transition:all 0.25s;}
#alert.detected{background:#091509;border-color:var(--green-mid);color:var(--green);}
#alert.lost{background:#150909;border-color:#6a2020;color:var(--red);}

/* METRICS */
#metrics{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;flex-shrink:0;}
.met{background:var(--bg2);border:0.5px solid var(--border);border-radius:6px;padding:8px 8px;}
.met-label{font-family:var(--mono);font-size:9px;color:var(--text-dimmer);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.met-val{font-family:var(--mono);font-size:19px;color:var(--text-dim);line-height:1;}
.met-val.lit{color:var(--green);}.met-val.amb{color:var(--amber);}
.met-unit{font-size:9px;color:var(--text-dimmer);}
#m-bat{font-size:12px;line-height:1.3;}

/* LOG */
#log{background:var(--bg);border:0.5px solid var(--border);border-radius:6px;height:58px;overflow-y:auto;padding:5px 8px;flex-shrink:0;}
#log::-webkit-scrollbar{width:2px;}#log::-webkit-scrollbar-thumb{background:var(--border2);}
.ll{font-family:var(--mono);font-size:10px;color:var(--text-dimmer);line-height:1.7;}
.ll.s{color:var(--green)}.ll.m{color:var(--amber)}.ll.w{color:#777}.ll.lost{color:var(--red)}.ll.sys{color:#383838}

/* CONTROLS */
#controls{display:flex;flex-direction:column;gap:7px;flex-shrink:0;}
#sens-row{display:flex;align-items:center;gap:10px;background:var(--bg2);border:0.5px solid var(--border);border-radius:6px;padding:11px 14px;}
#sens-row label{font-family:var(--mono);font-size:11px;color:var(--text-dim);white-space:nowrap;}
#sens-slider{flex:1;-webkit-appearance:none;height:3px;background:var(--border2);border-radius:2px;outline:none;}
#sens-slider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--green-mid);cursor:pointer;}
#sens-val{font-family:var(--mono);font-size:13px;color:var(--green);min-width:16px;text-align:right;}
#btn-row{display:grid;grid-template-columns:1fr 2fr;gap:8px;}
.btn{border-radius:8px;font-family:var(--ui);font-weight:600;font-size:17px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;padding:17px 10px;text-align:center;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text-dim);transition:all 0.12s;}
.btn:active{transform:scale(0.97);}
.btn.start{background:#0a1a0a;border-color:var(--green-dim);color:var(--green);}
.btn.stop{background:#1a0a0a;border-color:#6a2020;color:var(--red);}

/* FLASH */
#flash{position:fixed;inset:0;pointer-events:none;background:rgba(57,255,20,0);transition:background 0.08s;z-index:99;}

/* SETUP */
#setup{position:fixed;inset:0;background:rgba(0,0,0,0.93);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;overflow-y:auto;}
#setup-box{background:var(--bg2);border:0.5px solid var(--border2);border-radius:10px;padding:22px 18px;width:100%;max-width:440px;}
#setup-box h2{font-family:var(--mono);font-size:13px;color:var(--green);letter-spacing:3px;margin-bottom:18px;text-transform:uppercase;}
.setup-cols{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px;}
.setup-cols span{font-family:var(--mono);font-size:9px;color:var(--text-dimmer);text-transform:uppercase;letter-spacing:0.5px;padding-left:2px;}
.setup-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
.setup-row input{background:var(--bg);border:0.5px solid var(--border2);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:13px;padding:10px;outline:none;width:100%;}
.setup-row input:focus{border-color:var(--green-dim);}
.setup-single{margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border);}
.setup-single label{font-family:var(--mono);font-size:10px;color:var(--text-dim);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.setup-single input{background:var(--bg);border:0.5px solid var(--border2);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:13px;padding:9px 10px;width:80px;outline:none;text-align:center;}
#go-btn{margin-top:18px;width:100%;padding:15px;background:#0a1a0a;border:0.5px solid var(--green-dim);border-radius:6px;color:var(--green);font-family:var(--mono);font-size:14px;letter-spacing:3px;cursor:pointer;text-transform:uppercase;}
</style>
</head>
<body>
<div id="flash"></div>

<div id="setup">
  <div id="setup-box">
    <h2>Session Setup</h2>
    <div class="setup-cols"><span>Bat name</span><span>Frequency MHz</span></div>
    <div class="setup-row"><input id="n0" placeholder="Bat 1" value="Bat 1"><input id="f0" placeholder="150.120" value="150.120"></div>
    <div class="setup-row"><input id="n1" placeholder="Bat 2" value=""><input id="f1" placeholder="150.340" value=""></div>
    <div class="setup-row"><input id="n2" placeholder="Bat 3" value=""><input id="f2" placeholder="150.560" value=""></div>
    <div class="setup-row"><input id="n3" placeholder="Bat 4" value=""><input id="f3" placeholder="150.780" value=""></div>
    <div class="setup-single">
      <label>Lotek dwell time per frequency (seconds)</label>
      <input type="number" id="dwell" value="4" min="1" max="30">
    </div>
    <div class="setup-single">
      <label>Signal lost alert after (seconds)</label>
      <input type="number" id="lost-thresh" value="5" min="3" max="30">
    </div>
    <button id="go-btn" onclick="startSession()">Begin Session</button>
  </div>
</div>

<div id="app">
  <div id="header">
    <div id="logo">BAT TRACKER</div>
    <div id="header-right">
      <div id="countdown-wrap">
        <div id="countdown-label">Civil twilight</div>
        <div id="countdown-val">--:--</div>
      </div>
      <div id="rec-wrap">
        <div id="rec-dot"></div>
        <span id="rec-text">STANDBY</span>
      </div>
    </div>
  </div>

  <div id="modes">
    <div class="mode-tab active" onclick="setMode('sweep')">Sweep</div>
    <div class="mode-tab" onclick="setMode('sentinel')">Sentinel</div>
    <div class="mode-tab" onclick="setMode('drive')">Drive</div>
  </div>

  <div id="bat-strip"></div>

  <div id="wave-wrap">
    <canvas id="waveform"></canvas>
    <div id="peak-label"></div>
  </div>

  <div id="drive-panel">
    <div id="drive-count-wrap">
      <div id="drive-count">0</div>
      <div id="drive-count-label">detections this session</div>
    </div>
    <div id="drive-status">LISTENING</div>
    <div id="drive-last">-- no detections yet --</div>
  </div>

  <div id="alert">-- awaiting signal --</div>

  <div id="map-log"></div>

  <div id="metrics">
    <div class="met"><div class="met-label">Signal</div><div class="met-val" id="m-sig">0<span class="met-unit">dB</span></div></div>
    <div class="met"><div class="met-label">Peak</div><div class="met-val" id="m-peak">0<span class="met-unit">dB</span></div></div>
    <div class="met"><div class="met-label">Bat</div><div class="met-val" id="m-bat">---</div></div>
    <div class="met"><div class="met-label">Count</div><div class="met-val" id="m-count">0</div></div>
  </div>

  <div id="log"><div class="ll sys">session ready</div></div>

  <div id="controls">
    <div id="sens-row">
      <label>SENSITIVITY</label>
      <input type="range" id="sens-slider" min="1" max="10" value="7" oninput="setSens(this.value)">
      <span id="sens-val">7</span>
    </div>
    <div id="btn-row">
      <button class="btn" onclick="resetPeak()">RESET</button>
      <button class="btn start" id="main-btn" onclick="toggleListen()">START</button>
    </div>
  </div>
</div>

<script>
let bats=[], dwellTime=4000, lostThresh=5000;
let currentBat=0, batTimer=null, sensitivity=7;
let running=false, mode='sweep';
let audioCtx, analyser, micSource, micStream, animId;
let peakVal=0, peakDecay=0, sessionPeak=0;
let detCount=0, lastDetTime=0, fadeTimer=null;
let buf=[], BUF=600;
let canvas, ctx, cw, ch;
let twilightTime=null, countdownTimer=null;
let speechEnabled='speechSynthesis' in window;
let lastSpeakTime=0;
let signalWasPresent=false;
let gpsLog=[], lastGPS=null, gpsWatch=null;
let driveDetCount=0;

function startSession(){
  bats=[];
  for(let i=0;i<4;i++){
    let n=document.getElementById('n'+i).value.trim();
    let f=document.getElementById('f'+i).value.trim();
    if(n&&f) bats.push({name:n,freq:f});
  }
  if(!bats.length) bats=[{name:'Bat 1',freq:'150.120'}];
  dwellTime=(parseInt(document.getElementById('dwell').value)||4)*1000;
  lostThresh=(parseInt(document.getElementById('lost-thresh').value)||5)*1000;
  document.getElementById('setup').style.display='none';
  buildPills();
  initCanvas();
  buf=new Array(BUF).fill({v:0,spike:false});
  drawFrame(0,false);
  initCountdown();
  log('Session started — '+bats.length+' bat(s)','sys');
}

// --- Civil Twilight ---
function initCountdown(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      twilightTime=calcCivilTwilight(pos.coords.latitude,pos.coords.longitude);
      log('Civil twilight: '+formatTime(twilightTime),'sys');
      startCountdownTick();
    },()=>{
      document.getElementById('countdown-val').textContent='no gps';
      log('GPS unavailable','sys');
    });
  } else {
    document.getElementById('countdown-val').textContent='no gps';
  }
}

function calcCivilTwilight(lat,lng){
  let now=new Date();
  let J=now.getTime()/86400000+2440587.5;
  let n=Math.ceil(J-2451545.0+0.0008);
  let Js=n-lng/360;
  let M=(357.5291+0.98560028*Js)%360;
  let C=1.9148*sind(M)+0.0200*sind(2*M)+0.0003*sind(3*M);
  let lam=(M+C+180+102.9372)%360;
  let Jt=2451545.0+Js+0.0053*sind(M)-0.0069*sind(2*lam);
  let decl=Math.asin(sind(lam)*sind(23.4397));
  let cosH=(sind(-6)-sind(lat)*Math.sin(decl))/(cosd(lat)*Math.cos(decl));
  if(cosH<-1||cosH>1) return null;
  let H=Math.acos(cosH)*(180/Math.PI);
  let Jset=Jt+H/360;
  return new Date((Jset-2440587.5)*86400000);
}

function sind(d){return Math.sin(d*Math.PI/180);}
function cosd(d){return Math.cos(d*Math.PI/180);}
function formatTime(d){if(!d)return '--:--';return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}

function startCountdownTick(){
  if(countdownTimer) clearInterval(countdownTimer);
  countdownTimer=setInterval(updateCountdown,10000);
  updateCountdown();
}

function updateCountdown(){
  if(!twilightTime) return;
  let diff=twilightTime-new Date();
  let el=document.getElementById('countdown-val');
  if(diff<=0){
    el.textContent='DONE'; el.className='red';
    speak('Survey complete');
    clearInterval(countdownTimer); return;
  }
  let mins=Math.floor(diff/60000);
  let secs=Math.floor((diff%60000)/1000);
  el.textContent=mins+'m '+secs.toString().padStart(2,'0')+'s';
  if(mins<10) el.className='red';
  else if(mins<30) el.className='amber';
  else el.className='';
  if(mins===10&&secs<15) speak('Ten minutes to end of survey');
}

// --- Voice ---
function speak(text){
  if(!speechEnabled) return;
  let now=Date.now();
  if(now-lastSpeakTime<2500) return;
  lastSpeakTime=now;
  window.speechSynthesis.cancel();
  let utt=new SpeechSynthesisUtterance(text);
  utt.volume=1.0; utt.rate=0.9;
  window.speechSynthesis.speak(utt);
}

// --- UI ---
function buildPills(){
  let strip=document.getElementById('bat-strip');
  strip.innerHTML='';
  bats.forEach((b,i)=>{
    let p=document.createElement('div');
    p.className='bat-pill'+(i===0?' active':'');
    p.id='pill-'+i;
    p.innerHTML='<div class="pip"></div><span>'+b.name+' · '+b.freq+'</span>';
    strip.appendChild(p);
  });
  document.getElementById('m-bat').textContent=bats[0]?.name||'---';
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-tab').forEach((t,i)=>t.classList.toggle('active',['sweep','sentinel','drive'][i]===m));

  // Show/hide waveform vs drive panel
  if(m==='drive'){
    document.getElementById('wave-wrap').style.display='none';
    document.getElementById('drive-panel').style.display='flex';
    document.getElementById('map-log').style.display='block';
    document.getElementById('sens-row').style.display='none';
    startGPS();
  } else {
    document.getElementById('wave-wrap').style.display='block';
    document.getElementById('drive-panel').style.display='none';
    document.getElementById('map-log').style.display='none';
    document.getElementById('sens-row').style.display='flex';
    stopGPS();
  }
  clearAlertBanner();
  log('Mode: '+m.toUpperCase(),'sys');
}

function setSens(v){ sensitivity=parseInt(v); document.getElementById('sens-val').textContent=v; }

function resetPeak(){
  peakVal=0; peakDecay=0; sessionPeak=0;
  document.getElementById('m-peak').innerHTML='0<span class="met-unit">dB</span>';
  document.getElementById('m-peak').className='met-val';
  document.getElementById('peak-label').textContent='';
}

// --- Canvas ---
function initCanvas(){
  canvas=document.getElementById('waveform');
  ctx=canvas.getContext('2d');
  resize();
  window.addEventListener('resize',resize);
}

function resize(){
  if(!canvas) return;
  cw=canvas.offsetWidth; ch=canvas.offsetHeight;
  canvas.width=cw; canvas.height=ch;
}

// --- GPS ---
function startGPS(){
  if(!navigator.geolocation) return;
  gpsWatch=navigator.geolocation.watchPosition(p=>{
    lastGPS={lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy};
  },null,{enableHighAccuracy:true,maximumAge:2000});
}

function stopGPS(){
  if(gpsWatch) navigator.geolocation.clearWatch(gpsWatch);
  gpsWatch=null;
}

// --- Mic ---
async function toggleListen(){ running ? stopListening() : await startListening(); }

async function startListening(){
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=2048; analyser.smoothingTimeConstant=0.25;
    micSource=audioCtx.createMediaStreamSource(micStream);
    micSource.connect(analyser);
    running=true; setUI(true); startBatScan(); audioLoop();
    log('Microphone active','sys');
  } catch(e){
    log('Mic denied — demo mode','sys');
    startDemo();
  }
}

function stopListening(){
  running=false;
  if(micStream) micStream.getTracks().forEach(t=>t.stop());
  if(audioCtx) audioCtx.close();
  if(animId) cancelAnimationFrame(animId);
  if(batTimer) clearInterval(batTimer);
  if(fadeTimer) clearTimeout(fadeTimer);
  setUI(false); clearAlertBanner();
  log('Stopped','sys');
}

function setUI(on){
  document.getElementById('rec-dot').className=on?'live':'';
  document.getElementById('rec-text').textContent=on?'LIVE':'STANDBY';
  let btn=document.getElementById('main-btn');
  btn.textContent=on?'STOP':'START';
  btn.className='btn '+(on?'stop':'start');
}

function startBatScan(){
  if(batTimer) clearInterval(batTimer);
  currentBat=0; updateBat();
  if(bats.length>1) batTimer=setInterval(()=>{ currentBat=(currentBat+1)%bats.length; updateBat(); },dwellTime);
}

function updateBat(){
  document.querySelectorAll('.bat-pill').forEach((p,i)=>p.classList.toggle('active',i===currentBat));
  document.getElementById('m-bat').textContent=bats[currentBat]?.name||'---';
}

// --- Audio ---
function audioLoop(){
  if(!running||!analyser) return;
  let arr=new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(arr);
  let sum=0;
  for(let i=0;i<arr.length;i++){ let v=(arr[i]-128)/128; sum+=v*v; }
  processSample(Math.sqrt(sum/arr.length));
  animId=requestAnimationFrame(audioLoop);
}

let demoTO;
function startDemo(){
  running=true; setUI(true); startBatScan();
  let step=0,phase=0;
  function tick(){
    step++;
    if(step%120===0) phase=(phase+1)%6;
    let base=0.012+Math.random()*0.018,spike=0;
    if(phase===2){ let p=(step%120)/120; spike=Math.sin(p*Math.PI)*(0.5+Math.random()*0.4); }
    else if(phase===4){ if(step%20<3) spike=0.15+Math.random()*0.1; }
    processSample(Math.min(1,base+spike));
    if(running) demoTO=setTimeout(tick,50);
  }
  tick();
  document.getElementById('main-btn').onclick=()=>{
    running=false; clearTimeout(demoTO);
    if(batTimer) clearInterval(batTimer);
    if(fadeTimer) clearTimeout(fadeTimer);
    setUI(false); clearAlertBanner();
    document.getElementById('main-btn').onclick=toggleListen;
    log('Demo stopped','sys');
  };
}

// --- Process ---
function processSample(rms){
  let threshold=(11-sensitivity)*0.033;
  let isSpike=rms>threshold;
  let db=Math.round(rms*100);

  buf.push({v:rms,spike:isSpike});
  if(buf.length>BUF) buf.shift();

  peakDecay++;
  if(rms>peakVal){ peakVal=rms; peakDecay=0; }
  if(peakDecay>100) peakVal=Math.max(0,peakVal-0.002);
  if(rms>sessionPeak) sessionPeak=rms;

  document.getElementById('m-sig').innerHTML=db+'<span class="met-unit">dB</span>';
  document.getElementById('m-sig').className='met-val'+(isSpike?' lit':'');
  let pd=Math.round(peakVal*100);
  document.getElementById('m-peak').innerHTML=pd+'<span class="met-unit">dB</span>';
  document.getElementById('m-peak').className='met-val'+(pd>5?' amb':'');

  if(isSpike){
    if(!signalWasPresent){
      signalWasPresent=true;
      let bat=bats[currentBat];
      setAlertBanner((bat?bat.name+' · '+bat.freq+' MHz':'Signal')+' — DETECTED','detected');
      speak(bat?bat.name+' detected':'Signal detected');
      flashScreen('green');
    }
    detCount++;
    document.getElementById('m-count').textContent=detCount;
    document.getElementById('m-count').className='met-val lit';
    lastDetTime=Date.now();
    logDetection(rms);
    resetFadeTimer();

    // Drive mode specific
    if(mode==='drive'){
      driveDetCount++;
      document.getElementById('drive-count').textContent=driveDetCount;
      document.getElementById('drive-count').className='lit';
      document.getElementById('drive-status').textContent='DETECTED';
      document.getElementById('drive-status').className='detected';
      if(lastGPS){
        let bat=bats[currentBat];
        let entry={bat:bat?.name||'?',freq:bat?.freq||'?',db,lat:lastGPS.lat,lng:lastGPS.lng,time:tstamp()};
        gpsLog.push(entry);
        updateDriveLast(entry);
        addMapLogEntry(entry,rms);
      }
    }
  }

  if(mode!=='drive') drawFrame(rms,isSpike);
}

function updateDriveLast(e){
  document.getElementById('drive-last').innerHTML=
    e.time+' · '+e.bat+' · '+e.db+'dB<br>'+
    (e.lat?e.lat.toFixed(5)+', '+e.lng.toFixed(5):'no gps');
}

function addMapLogEntry(e,rms){
  let wrap=document.getElementById('map-log');
  let div=document.createElement('div');
  div.className='map-entry';
  let cls=rms>0.5?'db-s':rms>0.25?'db-m':'db-w';
  div.innerHTML='<span>'+e.time+'</span><span>'+e.bat+'</span><span class="'+cls+'">'+e.db+'dB</span><span class="gps">'+(e.lat?e.lat.toFixed(4)+','+e.lng.toFixed(4):'no gps')+'</span>';
  wrap.appendChild(div);
  wrap.scrollTop=wrap.scrollHeight;
}

// --- Signal Lost ---
function resetFadeTimer(){
  if(fadeTimer) clearTimeout(fadeTimer);
  fadeTimer=setTimeout(()=>{
    if(!signalWasPresent) return;
    signalWasPresent=false;
    let bat=bats[currentBat];
    setAlertBanner((bat?bat.name+' · '+bat.freq+' MHz':'Signal')+' — LOST','lost');
    speak(bat?bat.name+' signal lost':'Signal lost');
    flashScreen('red');
    log(tstamp()+'  '+(bat?bat.name:'?')+'  SIGNAL LOST','lost');
    if(mode==='drive'){
      document.getElementById('drive-status').textContent='LISTENING';
      document.getElementById('drive-status').className='';
    }
  },lostThresh);
}

function setAlertBanner(msg,cls){
  let el=document.getElementById('alert');
  el.textContent=msg; el.className=cls;
}

function clearAlertBanner(){
  document.getElementById('alert').textContent='-- awaiting signal --';
  document.getElementById('alert').className='';
  if(fadeTimer) clearTimeout(fadeTimer);
  signalWasPresent=false;
}

function flashScreen(color){
  let el=document.getElementById('flash');
  el.style.background=color==='green'?'rgba(57,255,20,0.13)':'rgba(255,51,51,0.16)';
  setTimeout(()=>el.style.background='rgba(57,255,20,0)',350);
}

function logDetection(rms){
  let bat=bats[currentBat];
  let strength=rms>0.5?'STRONG':rms>0.25?'MEDIUM':'WEAK';
  let cls=rms>0.5?'s':rms>0.25?'m':'w';
  log(tstamp()+'  '+(bat?bat.name:'?')+'  '+Math.round(rms*100)+'dB  '+strength,cls);
}

function log(msg,cls){
  let wrap=document.getElementById('log');
  let line=document.createElement('div');
  line.className='ll '+(cls||'');
  line.textContent=msg;
  wrap.appendChild(line);
  wrap.scrollTop=wrap.scrollHeight;
}

function tstamp(){
  let n=new Date();
  return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')+':'+n.getSeconds().toString().padStart(2,'0');
}

// --- Draw ---
function drawFrame(rms,isSpike){
  if(!ctx||!cw||!ch) return;
  ctx.fillStyle='#030303';
  ctx.fillRect(0,0,cw,ch);

  ctx.strokeStyle='#141414';
  ctx.lineWidth=0.5;
  for(let i=1;i<4;i++){ let y=ch*i/4; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(cw,y); ctx.stroke(); }

  let threshold=(11-sensitivity)*0.033;
  let ty=ch-(threshold*ch*0.9);
  ctx.strokeStyle='#1e1e0a'; ctx.lineWidth=0.5;
  ctx.setLineDash([3,6]);
  ctx.beginPath(); ctx.moveTo(0,ty); ctx.lineTo(cw,ty); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#2a2a10'; ctx.font='9px monospace';
  ctx.fillText('threshold',4,ty-3);

  if(sessionPeak>0.01){
    let spy=ch-(sessionPeak*ch*0.9);
    ctx.strokeStyle='rgba(255,51,51,0.35)'; ctx.lineWidth=0.5;
    ctx.setLineDash([2,6]);
    ctx.beginPath(); ctx.moveTo(0,spy); ctx.lineTo(cw,spy); ctx.stroke();
    ctx.setLineDash([]);
    document.getElementById('peak-label').textContent='session peak: '+Math.round(sessionPeak*100)+'dB';
  }

  if(buf.length<2) return;
  let sw=cw/BUF;
  for(let i=1;i<buf.length;i++){
    let d0=buf[i-1]||{v:0}; let d1=buf[i]||{v:0};
    let x0=(i-1)*sw; let x1=i*sw;
    let y0=ch-(d0.v*ch*0.9); let y1=ch-(d1.v*ch*0.9);
    let v=d1.v;
    let color;
    if(v<threshold){ color='#1a2a1a'; }
    else{
      let intensity=Math.min(v/0.6,1);
      if(intensity<0.3) color='#0044aa';
      else if(intensity<0.55) color='#cccc00';
      else if(intensity<0.8) color='#ffaa00';
      else color='#39ff14';
    }
    ctx.strokeStyle=color; ctx.lineWidth=d1.spike?2:1.2;
    ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
  }

  if(peakVal>threshold){
    let px=cw-3; let py=ch-(peakVal*ch*0.9);
    ctx.fillStyle='#39ff14';
    ctx.beginPath(); ctx.arc(px,py,3,0,Math.PI*2); ctx.fill();
  }

  let ts=tstamp();
  ctx.fillStyle='#252525'; ctx.font='9px monospace';
  ctx.fillText(ts,cw-48,ch-5);
}
</script>
